<svg width="760" height="180" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- IntelliJ bottom stripe: orange → yellow → cyan -->
    <linearGradient id="ijStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fc801d"/>
      <stop offset="45%"  stop-color="#f4af35"/>
      <stop offset="100%" stop-color="#19c9f3"/>
    </linearGradient>

    <!-- Morphing trail: IntelliJ orange → electric purple → VSCode blue -->
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#fc801d" stop-opacity="0.9"/>
      <stop offset="35%"  stop-color="#e056a0" stop-opacity="0.8"/>
      <stop offset="65%"  stop-color="#6c5ce7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0078d4" stop-opacity="0.9"/>
    </linearGradient>

    <!-- VSCode blue gradient -->
    <linearGradient id="vsBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2c9ed4"/>
      <stop offset="100%" stop-color="#1565b8"/>
    </linearGradient>

    <!-- Soft glow filter for particles -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip paths -->
    <clipPath id="ijClip"><rect x="55" y="24" width="114" height="114" rx="18"/></clipPath>
    <clipPath id="vsClip"><rect x="591" y="24" width="114" height="114" rx="18"/></clipPath>
  </defs>

  <!-- ── Background ───────────────────────────────────────── -->
  <rect width="760" height="180" fill="url(#bg)" rx="14"/>

  <!-- ── IntelliJ IDEA Logo ────────────────────────────────── -->
  <!-- Outer glow -->
  <rect x="53" y="22" width="118" height="118" rx="20" fill="#fc801d" opacity="0.12"/>
  <!-- Black box -->
  <rect x="55" y="24" width="114" height="114" rx="18" fill="#000000"/>
  <!-- Gradient bottom stripe -->
  <rect x="55" y="113" width="114" height="25" fill="url(#ijStripe)" clip-path="url(#ijClip)"/>
  <!-- IJ text -->
  <text x="112" y="109"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="46" font-weight="800"
        fill="#ffffff" text-anchor="middle">IJ</text>
  <!-- Caption -->
  <text x="112" y="157"
        font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="middle" letter-spacing="0.5">IntelliJ IDEA</text>

  <!-- ── Morphing Particle Trail ───────────────────────────── -->
  <!-- Dashed gradient line -->
  <line x1="177" y1="81" x2="583" y2="81"
        stroke="url(#trail)" stroke-width="1.5"
        stroke-dasharray="8 6" opacity="0.55"/>

  <!-- Arrow head -->
  <polygon points="580,74 597,81 580,88" fill="#0078d4" opacity="0.9"/>

  <!-- Particles with glow — color arc from orange → pink → purple → blue -->
  <g filter="url(#glow)">
    <circle cx="198" cy="81"  r="5.5" fill="#fc801d" opacity="0.95"/>
    <circle cx="222" cy="67"  r="3.5" fill="#f4701a" opacity="0.80"/>
    <circle cx="248" cy="95"  r="4.5" fill="#e8508c" opacity="0.85"/>
    <circle cx="272" cy="68"  r="3"   fill="#d946a8" opacity="0.75"/>
    <circle cx="300" cy="93"  r="5.5" fill="#b832cc" opacity="0.80"/>
    <circle cx="325" cy="67"  r="3.5" fill="#9b32e0" opacity="0.75"/>
    <circle cx="350" cy="81"  r="4"   fill="#7c5ce7" opacity="0.80"/>
    <circle cx="378" cy="94"  r="3"   fill="#5e6def" opacity="0.75"/>
    <circle cx="404" cy="67"  r="5"   fill="#4481e8" opacity="0.80"/>
    <circle cx="430" cy="93"  r="3.5" fill="#2c8fd8" opacity="0.75"/>
    <circle cx="456" cy="68"  r="4.5" fill="#189ade" opacity="0.85"/>
    <circle cx="482" cy="94"  r="3"   fill="#0e9de8" opacity="0.75"/>
    <circle cx="508" cy="68"  r="5"   fill="#0a90d8" opacity="0.80"/>
    <circle cx="534" cy="92"  r="3.5" fill="#0882ce" opacity="0.80"/>
    <circle cx="558" cy="81"  r="5.5" fill="#0078d4" opacity="0.95"/>
  </g>

  <!-- Morph label -->
  <text x="380" y="148"
        font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="10" fill="#30363d" text-anchor="middle" letter-spacing="3">· · · migrating · · ·</text>

  <!-- ── VSCode Logo ────────────────────────────────────────── -->
  <!-- Outer glow -->
  <rect x="589" y="22" width="118" height="118" rx="20" fill="#0078d4" opacity="0.18"/>
  <!-- Blue gradient background -->
  <rect x="591" y="24" width="114" height="114" rx="18" fill="url(#vsBlue)"/>

  <!--
    VSCode icon: the distinctive "unfolding box" shape.
    Composed of two white pieces:
      1. Main piece  — left bar + bottom bar + bottom-right corner (3 sides of a square)
      2. Detached piece — top bar + top-right corner (floating slightly apart)
    Together they suggest an opening box / document.
  -->
  <!-- Main piece: left vertical + bottom horizontal + bottom-right vertical -->
  <rect x="605" y="54"  width="14" height="68" rx="3" fill="white" opacity="0.95" clip-path="url(#vsClip)"/>
  <rect x="605" y="108" width="56" height="14" rx="3" fill="white" opacity="0.95" clip-path="url(#vsClip)"/>
  <rect x="647" y="78"  width="14" height="44" rx="3" fill="white" opacity="0.95" clip-path="url(#vsClip)"/>

  <!-- Detached piece: top horizontal + top-right vertical (the "floating lid") -->
  <rect x="605" y="38"  width="56" height="14" rx="3" fill="white" opacity="0.90" clip-path="url(#vsClip)"/>
  <rect x="647" y="38"  width="14" height="32" rx="3" fill="white" opacity="0.90" clip-path="url(#vsClip)"/>

  <!-- Gap between pieces (to reinforce the "detached" visual) -->
  <!-- The gap is implicit: main piece starts at y=54, detached ends at y=52 (2px gap) -->

  <!-- Caption -->
  <text x="648" y="157"
        font-family="-apple-system, system-ui, 'Segoe UI', sans-serif"
        font-size="11" fill="#484f58" text-anchor="middle" letter-spacing="0.5">VS Code</text>
</svg>
